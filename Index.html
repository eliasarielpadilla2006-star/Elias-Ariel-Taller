<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGym | Tu Transformación Inicia Aquí</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="main-container">
        <header>
            <h1>POWER<span>GYM</span></h1>
            <p>Supera tus límites, alcanza tus metas.</p>
        </header>

        <main>
            <div class="services">
                <div class="service-card">
                    <h3>Musculación</h3>
                    <p>Equipos de última generación.</p>
                </div>
                <div class="service-card">
                    <h3>Cardio</h3>
                    <p>Mejora tu resistencia física.</p>
                </div>
            </div>

            <div class="membership-section">
                <h2>Elige tu Plan</h2>
                <div class="plan-selector">
                    <button onclick="seleccionarPlan('Básico', '$29')">Plan Básico</button>
                    <button onclick="seleccionarPlan('Premium', '$49')">Plan Premium</button>
                </div>
                <p id="mensaje-plan">Selecciona un plan para ver los detalles.</p>
            </div>

            <div class="actions">
                <button class="btn-cta" onclick="toggleModoFuego()">Modo Entrenamiento 🔥</button>
            </div>
        </main>

        <footer>
            <p>© 2026 PowerGym - Proyecto de prueba en Vercel</p>
        </footer>
    </div>

    <script>
        // Función para mostrar el plan seleccionado
        function seleccionarPlan(nombre, precio) {
            const mensaje = document.getElementById('mensaje-plan');
            mensaje.innerHTML = `Has elegido el <strong>${nombre}</strong> por solo <strong>${precio}/mes</strong>.`;
            mensaje.style.color = "#ffbb33";
        }

        // Función para cambiar el estilo visual de la página (Modo Fuego)
        function toggleModoFuego() {
            document.body.classList.toggle('modo-fuego');
            const titulo = document.querySelector('h1 span');
            if (document.body.classList.contains('modo-fuego')) {
                alert('¡Modo Entrenamiento Activado! ¡A darle con todo! 💪');
            }
        }
    </script>
</body>
</html>
