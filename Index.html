<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias por asistir</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            text-align: center;
        }
        .container {
            padding: 20px;
            transition: background-color 0.3s;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        /* Clases que se activan con JavaScript */
        .dark-mode {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container" id="contenedor-principal">
        <header>
            <h1>¡Gracias por asistir al taller!</h1>
            <p>Esperamos que hayas disfrutado aprendiendo GitHub.</p>
        </header>

        <main>
            <img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" alt="Taller" class="icon" style="width: 100px;">
            <p>Recuerda practicar los conceptos: <strong>Fork, Commit, Pull Request</strong></p>
            
            <button onclick="alert('¡Sigue practicando! 🚀')">Haz clic aquí</button>

            <button onclick="cambiarModoOscuro()">Cambiar a Modo Oscuro 🌙</button>

            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #ccc;">
                <p>Nivel de motivación para programar: <strong id="contador">0</strong>%</p>
                <button onclick="aumentarMotivacion()">¡Aumentar motivación! 🔥</button>
            </div>
        </main>

        <footer style="margin-top: 40px;">
            <p>© 2026 Taller Básico de GitHub</p>
        </footer>
    </div>

    <script>
        // Función para cambiar el tema de la página
        function cambiarModoOscuro() {
            document.body.classList.toggle('dark-mode');
        }

        // Función para sumar números en la página
        let motivacion = 0;
        function aumentarMotivacion() {
            if (motivacion < 100) {
                motivacion += 10;
                document.getElementById('contador').innerText = motivacion;
            } else {
                alert('¡Ya estás al 100% de motivación! ¡A programar! 💻');
            }
        }
    </script>
</body>
</html>
